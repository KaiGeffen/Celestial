<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Celestial — Card Search</title>
    <meta
      name="description"
      content="Search Celestial's cards and community-made custom cards."
    />
    <link rel="icon" type="image/svg+xml" href="../../about/assets/favicon.svg" />
    <link rel="stylesheet" href="../cardmaker.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>Card Search</h1>
      <nav class="page-nav">
        <a href="../">Card Maker</a>
        <span aria-current="page">Card Search</span>
        <a href="https://celestialdecks.gg">Play the Game</a>
      </nav>
    </header>

    <main class="search-page">
      <div class="search-controls">
        <div class="source-toggle" role="tablist">
          <button id="tab-game" type="button" class="selected">
            Game cards
          </button>
          <button id="tab-community" type="button">Community cards</button>
        </div>

        <input
          id="search-input"
          type="search"
          placeholder="Search cards"
          autofocus
        />
        <p class="search-help" id="search-help">
          Supports <code>name:</code>, <code>text:</code>, <code>cost:2</code>,
          <code>cost:3+</code>, <code>points:1-3</code>, quoted phrases, and
          <code>!</code> to negate.
        </p>
      </div>

      <div id="results" class="gallery-grid"></div>
      <p id="search-status" class="gallery-status"></p>
      <div class="load-more-row">
        <button id="load-more" type="button" hidden>Load more</button>
      </div>
    </main>

    <footer class="site-footer">
      <p>
        <a href="https://store.steampowered.com/app/3810590/Celestial_Decks/"
          >Wishlist on Steam</a
        >
        · <a href="https://celestialdecks.gg">Play online</a> ·
        <a href="https://discord.gg/UXWswspB8S">Join the Discord</a>
      </p>
    </footer>

    <script type="module" src="search.js"></script>
  </body>
</html>
