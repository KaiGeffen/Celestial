# Serves the card maker at /cardmaker/ on the main domain.
# TLS is terminated by the upstream reverse proxy, so this listens plain HTTP.
# The /cardmaker/api prefix is routed by the proxy to the game server, never here.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;

    # Never serve the site's own build/meta files
    location ~* /(Dockerfile|nginx\.conf|SPEC\.md|generateAssets\.ts)$ {
        return 404;
    }

    # HTML revalidates, so content edits show up on the next deploy
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, no-cache";
    }

    # Static media can cache; a redeploy replaces the files
    location ~* \.(css|js|json|jpg|jpeg|png|gif|ico|svg|webp|ttf|otf|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
