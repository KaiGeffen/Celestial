# Serves the marketing sites at path prefixes on the main domain:
#   /about/  /press/  /privacy/  /streamer/
# TLS is terminated by the upstream reverse proxy, so this listens plain HTTP.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;

    # Never serve the sites' own build/meta files
    location ~* /(Dockerfile|nginx\.conf|README|PRESSKIT_SPEC\.md)$ {
        return 404;
    }

    # HTML revalidates, so content edits show up on the next deploy
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, no-cache";
    }

    # Static media can cache; a redeploy replaces the files
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|mp4|ogg|mp3|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
